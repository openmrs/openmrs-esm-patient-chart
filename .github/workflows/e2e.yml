name: E2E Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  TURBO_API: 'http://127.0.0.1:9080'
  TURBO_TOKEN: 'turbo-token'
  TURBO_TEAM: ${{ github.repository_owner }}

jobs:
  run_e2e_tests:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v6

      - name: 📋 Copy test environment variables
        run: cp example.env .env

      - name: 🛠️ Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22.x'
          cache: 'yarn'

      - name: 📦 Install dependencies
        run: yarn install --immutable

      - name: 🎭 Install Playwright Browsers
        run: npx playwright install chromium --with-deps

      - name: 🚀 Setup local cache server for Turborepo
        uses: felixmosh/turborepo-gh-artifacts@v4
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          server-token: ${{ env.TURBO_TOKEN }}

      - name: 🏗️ Build apps
        run: yarn turbo run build --color --concurrency=5

      - name: 🖥️ Run dev server
        run: bash e2e/support/github/run-e2e-docker-env.sh

      - name: ⏳ Wait for OpenMRS instance to start
        run: while [[ "$(curl -s -o /dev/null -w ''%{http_code}'' http://localhost:8080/openmrs/login.htm)" != "200" ]]; do sleep 10; done

      - name: 🧪 Run E2E tests
        run: yarn playwright test

      - name: 🛑 Stop dev server
        if: '!cancelled()'
        run: docker stop $(docker ps -a -q)

      - name: 📤 Upload Report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
          overwrite: true
